_config_version: 29
compression:
  abort_on_summary_failure: false
  codex_gpt55_autoraise: true
  enabled: true
  hygiene_hard_message_limit: 400
  protect_first_n: 3
  protect_last_n: 20
  target_ratio: 0.2
  threshold: 0.5
context:
  engine: compressor
cron:
  max_parallel_jobs: null
  wrap_response: true
curator:
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  prune_builtins: true
  stale_after_days: 30
delegation:
  api_key: ''
  api_mode: ''
  base_url: ''
  child_timeout_seconds: 600
  inherit_mcp_toolsets: true
  max_concurrent_children: 3
  max_iterations: 50
  max_spawn_depth: 1
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
  subagent_auto_approve: false
display:
  background_process_notifications: all
  bell_on_complete: false
  busy_input_mode: interrupt
  cleanup_progress: false
  compact: false
  copy_shortcut: auto
  credits_notices: true
  ephemeral_system_ttl: 0
  file_mutation_verifier: true
  final_response_markdown: strip
  inline_diffs: true
  interface: cli
  interim_assistant_messages: true
  language: en
  persist_prompts: true
  persistent_output: true
  persistent_output_max_lines: 200
  personality: kawaii
  platforms:
    discord:
      streaming: false
    telegram:
      streaming: true
  resume_display: full
  resume_exchanges: 10
  resume_max_assistant_chars: 200
  resume_max_assistant_lines: 3
  resume_max_user_chars: 300
  resume_skip_tool_only: true
  runtime_footer:
    enabled: false
    fields:
    - model
    - context_pct
    - cwd
  show_cost: false
  show_reasoning: false
  skin: default
  streaming: true
  timestamps: false
  tool_preview_length: 0
  tool_progress: all
  tool_progress_command: false
  tool_progress_overrides: {}
  tui_agents_nudge: true
  tui_auto_resume_recent: false
  tui_status_indicator: kaomoji
  turn_completion_explainer: true
  user_message_preview:
    first_lines: 2
    last_lines: 2
gateway:
  media_delivery_allow_dirs: []
  strict: false
  trust_recent_files: true
  trust_recent_files_seconds: 600
hooks_auto_accept: false
logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
  memory_monitor:
    enabled: true
    interval_seconds: 300
memory:
  flush_min_turns: 6
  memory_char_limit: 2200
  memory_enabled: true
  nudge_interval: 10
  provider: ''
  user_char_limit: 1375
  user_profile_enabled: true
  write_approval: false
model:
  base_url: https://chatgpt.com/backend-api/codex
  default: gpt-5.5
  provider: openai-codex
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - homeassistant
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - video
  - video_gen
  - vision
  - web
  discord:
  - hermes-discord
  google_chat:
  - hermes-google_chat
  homeassistant:
  - hermes-homeassistant
  qqbot:
  - hermes-qqbot
  signal:
  - hermes-signal
  slack:
  - hermes-slack
  teams:
  - hermes-teams
  telegram:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  whatsapp:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  yuanbao:
  - hermes-yuanbao
privacy:
  redact_pii: false
security:
  acked_advisories: []
  allow_lazy_installs: true
  allow_private_urls: false
  redact_secrets: <redacted>
  tirith_enabled: true
  tirith_fail_open: true
  tirith_path: tirith
  tirith_timeout: 5
  website_blocklist:
    domains: []
    enabled: false
    shared_files: []
sessions:
  auto_prune: false
  min_interval_hours: 24
  retention_days: 90
  vacuum_after_prune: true
  write_json_snapshots: false
skills:
  creation_nudge_interval: 15
  external_dirs: []
  guard_agent_created: false
  inline_shell: false
  inline_shell_timeout: 10
  template_vars: true
  write_approval: false
terminal:
  auto_source_bashrc: true
  backend: local
  container_cpu: 1
  container_disk: 51200
  container_memory: 5120
  container_persistent: true
  cwd: .
  daytona_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_env: {}
  docker_extra_args: []
  docker_forward_env: []
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_mount_cwd_to_workspace: false
  docker_run_as_host_user: false
  docker_volumes: []
  env_passthrough: []
  home_mode: auto
  lifetime_seconds: 300
  modal_image: nikolaik/python-nodejs:python3.11-nodejs20
  modal_mode: auto
  persistent_shell: true
  shell_init_files: []
  singularity_image: docker://nikolaik/python-nodejs:python3.11-nodejs20
  timeout: 180
  vercel_runtime: node24
timezone: Asia/Jakarta
tool_loop_guardrails:
  hard_stop_after:
    exact_failure: 5
    idempotent_no_progress: 5
    same_tool_failure: 8
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    idempotent_no_progress: 2
    same_tool_failure: 3
  warnings_enabled: true
tool_output:
  max_bytes: 50000
  max_line_length: 2000
  max_lines: 2000
tools:
  tool_search:
    enabled: auto
    max_search_limit: 20
    search_default_limit: 5
    threshold_pct: 10
toolsets:
- hermes-cli
updates:
  backup_keep: 5
  non_interactive_local_changes: stash
  pre_update_backup: false
web:
  backend: ddgs
  extract_backend: ''
  search_backend: ''
  use_gateway: false
